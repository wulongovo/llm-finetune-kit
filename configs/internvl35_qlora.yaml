# InternVL3-8B QLoRA 微调配置
# 适用于 8-12GB 显存 (RTX 3070/3080/4060)
# 4bit NF4 量化 + Double Quantization

model:
  name_or_path: OpenGVLab/InternVL3-8B
  trust_remote_code: true
  torch_dtype: bfloat16

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - qkv
    - proj
    - fc1
    - fc2
    - gate_proj
    - up_proj
    - down_proj

# QLoRA: 4bit NF4 量化
quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_use_double_quant: true

training:
  num_train_epochs: 3
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: cosine
  max_seq_length: 2048
  gradient_checkpointing: true
  bf16: true
  fp16: false
  max_grad_norm: 1.0
  optim: paged_adamw_8bit
  output_dir: outputs/internvl35_qlora
  logging_steps: 10
  save_steps: 100
  save_total_limit: 3
  seed: 42
  report_to: none

data:
  train_file: data/multimodal/train.jsonl
  eval_file: data/multimodal/eval.jsonl
  image_dir: data/multimodal/images
  format: auto
