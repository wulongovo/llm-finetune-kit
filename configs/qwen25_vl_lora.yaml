# Qwen2.5-VL 7B LoRA 微调配置
# 适用于 24GB 显存 (RTX 3090/4090)

model:
  name_or_path: Qwen/Qwen2.5-VL-7B-Instruct
  trust_remote_code: true
  torch_dtype: bfloat16

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

# LoRA 不需要量化，使用 bf16 精度
quantization: null

training:
  num_train_epochs: 3
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: cosine
  max_seq_length: 2048
  gradient_checkpointing: true
  bf16: true
  fp16: false
  max_grad_norm: 1.0
  optim: adamw_torch
  output_dir: outputs/qwen25_vl_lora
  logging_steps: 10
  save_steps: 100
  save_total_limit: 3
  seed: 42
  report_to: none

data:
  train_file: data/multimodal/train.jsonl
  eval_file: data/multimodal/eval.jsonl
  image_dir: data/multimodal/images
  format: auto
